<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Even or Odd</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:450px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
    text-align:center;
}

h1{
    color:#007BFF;
}

#result{
    margin-top:20px;
    font-size:20px;
    line-height:35px;
}
</style>

</head>
<body>

<div class="container">
    <h1>Even & Odd Checker</h1>
    <div id="result"></div>
</div>

<script>

let output = "";

for(let i = 1; i <= 5; i++){

    let number = Number(prompt("Enter Number " + i));

    if(number % 2 == 0){
        output += number + " is Even <br>";
    }
    else{
        output += number + " is Odd <br>";
    }

}

document.getElementById("result").innerHTML = output;

</script>

</body>
</html>
