<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>
<style>
    body{
    background:#f2f2f2;
    font-family:Arial;
}
form{

width:350px;

margin:50px auto;

background:white;

padding:25px;

border-radius:15px;

box-shadow:0 0 15px gray;

}
input,
select{

width:100%;

padding:10px;

margin-top:5px;

margin-bottom:15px;

border-radius:8px;

border:1px solid gray;

box-sizing:border-box;

}
.gender{
    display: flex;
    gap: 30px;
    margin: 10px 0 20px;
}

.gender label{
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 16px;
}

.gender input[type="radio"]{
    width: auto;
    margin: 0;
}

input,
select{
    width:100%;
}
input:not([type="radio"]),
select{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #ccc;
    box-sizing:border-box;
}
button{

width:100%;

padding:12px;

background:blue;

color:white;

border:none;

border-radius:8px;

font-size:18px;

cursor:pointer;

}
button:hover{

background:green;

}
@media(max-width:600px){

form{

width:90%;

}

}
</style>
<body>

    <form>

        <h1>Registration Form</h1>
        <label>Full Name</label>

<input type="text" placeholder="Enter Your Name">
<label>Email</label>

<input type="email" placeholder="Enter Email">

<label>Password</label>

<input type="password" placeholder="Enter Password">

<label>Age</label>

<input type="number" placeholder="Enter Age">

<!-- <label>Gender</label> -->

<label>Gender</label>

<div class="gender">

    <label>
        <input type="radio" name="gender"> Male
    </label>

    <label>
        <input type="radio" name="gender"> Female
    </label>

</div>

<br>
<label>Course</label>

<select>
    <option>Select Course</option>
    <option>Fronted Development</option>
    <option> Web Development with Backend Development</option>
    <option>Graphics Design</option>
    <option> Mobile application Development</option>
</select>

<br>
<label>City</label>

<select>
    <option>Select City</option>
    <option>Ghotki</option>
    <option>Sukkur</option>
    <option>Karachi</option>
    <option>Hyderabad</option>
</select>

<input type="submit">


</form>
</body>
</html>
