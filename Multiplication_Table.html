<!DOCTYPE html>
<html>
<head>
    <title>Multiplication Table</title>
</head>
<body>

    <script>
// Q6: Multiplication Table using Prompt and For Loop

let number = Number(prompt("Enter a Number"));

for (let i = 1; i <= 10; i++) {
    document.write(number + " x " + i + " = " + (number * i) + "<br>");
}
    </script>

</body>
</html>
