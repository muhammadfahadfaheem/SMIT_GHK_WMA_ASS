<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q7 - Countdown</title>
</head>
<body>

    <h1>Countdown Using While Loop</h1>

    <script>
        let count = 10;

while (count >= 1) {
    document.write(count + "<br>");
    count--;
}

document.write("<h2>Happy Coding!</h2>");
    </script>

</body>
</html>
